    function fly() {
        var centeropt = { "y": 31.672187, "x": 117.287423, "z": 1455.4, "heading": 357.8, "pitch": -70.5, "roll": 360 };
        let localPointData = {
            destination: Cesium.Cartesian3.fromDegrees(centeropt.x, centeropt.y, centeropt.z || 0), //经度、纬度、高度
            orientation: {
                heading: Cesium.Math.toRadians(centeropt.heading || 0),                          //绕垂直于地心的轴旋转
                pitch: Cesium.Math.toRadians(centeropt.pitch || -Cesium.Math.PI_OVER_FOUR),      //绕纬度线旋转
                roll: Cesium.Math.toRadians(centeropt.roll || 0)                                 //绕经度线旋转
            }
        };
        window.viewer.camera.flyTo(localPointData);
    }

    //加载图片覆盖物
    function loadPoint() {
        let billboardObj = new Cesium.BillboardGraphics({
            image: "/public/4-on.png",
            color: Cesium.Color.WHITE.withAlpha(1),
            height: 52,
            width: 44,
            rotation: 0,
            sizeInMeters: false,
            show: true,
            scale: 1.0,
            disableDepthTestDistance: 50000,
            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
        });
        const description = JSON.stringify("{'names':'twtw'}");
        window.viewer.entities.add({
            id: parseInt('443'),
            name: "monitorPoint",
            position: Cesium.Cartesian3.fromDegrees(
                parseFloat('117.287423'),
                parseFloat('31.672187'),
            ),
            description,
            billboard: billboardObj,
            label: {
                text: "twtw33",
                font: '14pt Source Han Sans CN', // 字体样式
                fillColor: Cesium.Color.write, // 字体颜色
                style: Cesium.LabelStyle.FILL, // label样式
                outlineWidth: 2,
                verticalOrigin: Cesium.VerticalOrigin.CENTER, // 垂直位置
                pixelOffset: new Cesium.Cartesian2(0, -68) // 偏移
            }
        });

        InitHandlerPointer();
        InitHandlerLablelClick();

    }

    //鼠标移动变手形
    function InitHandlerPointer() {
        const handler = new this.Cesium.ScreenSpaceEventHandler(window.viewer.scene.canvas);
        handler.setInputAction(function (movement) {
            const pickedObject = viewer.scene.pick(movement.endPosition);
            if (window.Cesium.defined(pickedObject)) {
                window.viewer._container.style.cursor = "pointer";
            } else {
                window.viewer._container.style.cursor = "default";
            }
        }, window.Cesium.ScreenSpaceEventType.MOUSE_MOVE);
    }

    //加载点击事件
    function InitHandlerLablelClick() {

        const handler = new Cesium.ScreenSpaceEventHandler(window.viewer.scene.canvas);
        handler.setInputAction(function (click) {
            const pick = window.viewer.scene.pick(click.position);
            document.getElementById('stateShow').style.display = "none";
            if (pick && pick.id) {
                if (pick.id.name == "monitorPoint") {
                    // alert('dd');
                    console.log(pick.id);
                    console.log(pick.id.description._value);                  
                    Popupposition(pick);
                    //window.viewer.scene.postRender.addEventListener(windowPosition);
                    //window.viewer.clock.onTick.addEventListener(windowPosition);
                    //var point = [117.28742, 31.672187];
                    //var popupCartesian = window.Cesium.Cartesian3.fromDegrees(point[0], point[1], 0);

                    //var position = window.Cesium.SceneTransforms.wgs84ToWindowCoordinates(window.viewer.scene, popupCartesian);

                    //var obj = { position: position, content: content };
                }
            }
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    }


    function Popupposition(e) {
        //经纬度转为世界坐标
        let gisPosition = Cesium.Cartesian3.fromDegrees(
            117.287423,
            31.672187,
            0
        );
        document.getElementById('stateShow').style.display = 'block' //弹出信息框
        //实时更新位置
        viewer.scene.postRender.addEventListener(() => {
            //转化为屏幕坐标
            var windowPosition = Cesium.SceneTransforms.wgs84ToWindowCoordinates(viewer.scene, gisPosition);
            document.getElementById('stateShow').style.left = (windowPosition.x - 100) + 'px'
            document.getElementById('stateShow').style.top = (windowPosition.y - 210) + 'px'

            //解决滚动不隐藏问题
            const camerPosition = viewer.camera.position;
            let height = viewer.scene.globe.ellipsoid.cartesianToCartographic(camerPosition).height;
            height += viewer.scene.globe.ellipsoid.maximumRadius;
            if ((!(Cesium.Cartesian3.distance(camerPosition, gisPosition) > height)) && viewer.camera.positionCartographic.height < 50000000) {
                document.getElementById('stateShow').style.display = "block"
            } else {
                document.getElementById('stateShow').style.display = "none"
            }

        })
    }
